<!DOCTYPE html>
<html>
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>

<style>
body {
    background: #0f172a;
    color: white;
}

.card {
    background: #111827;
    border: none;
}

.ird-logo {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    margin-right: 10px;
}
</style>

</head>

<body>

<div class="container-fluid p-3">

<!-- HEADER -->
<div class="d-flex align-items-center mb-3">
    <img src="https://planeteirdplus.ird.fr/images/upload/logo_planete_ird_.png"
         class="ird-logo">

    <h3 class="m-0">Capteur Résistif IRD</h3>
</div>

<!-- CONTROLS -->
<div class="row mb-3">

    <div class="col-md-4">
        <label>Capteur</label>
        <select id="capteur" class="form-select">
            <option value="ALL">Tous les capteurs</option>
        </select>
    </div>

    <div class="col-md-4">
        <label>Type de données</label>
        <select id="type">
            <option value="raw">Brut</option>
            <option value="filtered">Filtré</option>
            <option value="ALL">Les deux</option>
        </select>
    </div>
    

    <div class="col-md-4 d-flex align-items-end">
        <button class="btn btn-primary w-100" onclick="loadGraph()">
            Actualiser
        </button>
    </div>

</div>
<!-- bouton supprimer les données du capteur -->
<div class="row mb-3">

    <div class="col-md-6">
        <a href="/api/export?capteur=ALL" class="btn btn-success w-100">
             Export CSV
        </a>
    </div>

    <div class="col-md-6">
        <form method="POST" action="/clear"
              onsubmit="return confirm('Supprimer toutes les données ?');">
            <button class="btn btn-danger w-100">
                 Supprimer les données
            </button>
        </form>
    </div>

</div>
<!-- GRAPH -->
<div class="card p-2">
    <div id="graph" style="width:100%;height:600px;"></div>
</div>

</div>
<script>

const COLORS = {
    raw: "#ff4d4d",
    filtered: "#4da6ff"
};

// 🔥 map couleur par capteur
const colorMap = {};

// 🎨 couleur stable par capteur
function getColor(capteur) {
    if (!colorMap[capteur]) {
        const hue = Math.floor(Math.random() * 360);
        colorMap[capteur] = `hsl(${hue}, 80%, 55%)`;
    }
    return colorMap[capteur];
}

async function loadCapteurs() {
    const res = await fetch("/api/data2?capteur=ALL");
    const json = await res.json();

    const capteurs = [...new Set(json.data.map(d => d.capteur))];

    const select = document.getElementById("capteur");

    capteurs.forEach(c => {
        let opt = document.createElement("option");
        opt.value = c;
        opt.textContent = c;
        select.appendChild(opt);
    });
}

async function loadGraph() {

    const capteur = document.getElementById("capteur").value;
    const type = document.getElementById("type").value;

    const res = await fetch(`/api/data2?capteur=${capteur}`);
    const json = await res.json();

    const data = json.data;

    const traces = {};

    data.forEach(d => {

        const keyRaw = d.capteur + "_raw";
        const keyFilt = d.capteur + "_filtered";

        const color = getColor(d.capteur);

        // RAW
        if (type === "raw" || type === "ALL") {

            if (!traces[keyRaw]) {
                traces[keyRaw] = {
                    x: [],
                    y: [],
                    mode: "lines",
                    name: d.capteur + " RAW",
                    line: {
                        color: color,
                        width: 2
                    },
                    fill: "none",
                    opacity: 0.6
                };
            }

            traces[keyRaw].x.push(d.time);
            traces[keyRaw].y.push(d.raw);
        }

        // FILTERED
        if (type === "filtered" || type === "ALL") {

            if (!traces[keyFilt]) {
                traces[keyFilt] = {
                    x: [],
                    y: [],
                    mode: "lines",
                    name: d.capteur + " FILTERED",
                    line: {
                        color: color,
                        width: 3,
                        dash: "dot"
                    },
                    fill: "none",
                    opacity: 0.9
                };
            }

            traces[keyFilt].x.push(d.time);
            traces[keyFilt].y.push(d.filtered);
        }
    });

    const plotData = Object.values(traces);

    Plotly.newPlot("graph", plotData, {
        title: {
            text: "Capteur Résistif IRD",
            font: { size: 22, color: "white" }
        },

        paper_bgcolor: "#0f172a",
        plot_bgcolor: "#0f172a",

        xaxis: {
            title: "Date / Heure",
            type: "date",
            color: "white"
        },

        yaxis: {
            title: "Valeur",
            color: "white"
        },

        legend: {
            font: { color: "white" }
        }

    }, {
        responsive: true
    });
}

// init
loadCapteurs().then(loadGraph);

</script>

</body>
</html>
