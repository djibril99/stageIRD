<!DOCTYPE html>
<html>
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>

<style>
body {
    background: #0f172a;
    color: white;
}

.card {
    background: #111827;
    border: none;
}

.ird-logo {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    margin-right: 10px;
}
</style>

</head>

<body>

<div class="container-fluid p-3">

<!-- HEADER -->
<div class="d-flex align-items-center mb-3">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Logo_IRD.svg/512px-Logo_IRD.svg.png"
         class="ird-logo">

    <h3 class="m-0">Capteur Résistif IRD</h3>
</div>

<!-- CONTROLS -->
<div class="row mb-3">

    <div class="col-md-4">
        <label>Capteur</label>
        <select id="capteur" class="form-select">
            <option value="ALL">Tous les capteurs</option>
        </select>
    </div>

    <div class="col-md-4">
        <label>Type de données</label>
        <select id="type">
            <option value="raw">Brut</option>
            <option value="filtered">Filtré</option>
            <option value="ALL">Les deux</option>
        </select>
    </div>

    <div class="col-md-4 d-flex align-items-end">
        <button class="btn btn-primary w-100" onclick="loadGraph()">
            Actualiser
        </button>
    </div>

</div>

<!-- GRAPH -->
<div class="card p-2">
    <div id="graph" style="width:100%;height:600px;"></div>
</div>

</div>

<script>

async function loadCapteurs() {
    const res = await fetch("/api/data2?capteur=ALL");
    const json = await res.json();

    const capteurs = [...new Set(json.data.map(d => d.capteur))];

    const select = document.getElementById("capteur");

    capteurs.forEach(c => {
        let opt = document.createElement("option");
        opt.value = c;
        opt.textContent = c;
        select.appendChild(opt);
    });
}

async function loadGraph() {

    const capteur = document.getElementById("capteur").value;
    const type = document.getElementById("type").value;

    const res = await fetch(`/api/data2?capteur=${capteur}`);
    const json = await res.json();

    const data = json.data;

    const traces = {};

    data.forEach(d => {

        if (!traces[d.capteur]) {
            traces[d.capteur] = {
                x: [],
                y: [],
                mode: "lines",
                name: d.capteur,
                fill: "tozeroy",
                opacity: 0.3
            };
        }

        if (type === "raw") {
            traces[d.capteur].y.push(d.raw);
        } 
        else if (type === "filtered") {
            traces[d.capteur].y.push(d.filtered);
        } 
        else {
            traces[d.capteur].y.push(d.raw);
        }

        traces[d.capteur].x.push(d.time);
    });

    const plotData = Object.values(traces);

    Plotly.newPlot("graph", plotData, {
        title: {
            text: "Capteur Résistif IRD",
            font: { size: 22, color: "white" }
        },
        paper_bgcolor: "#0f172a",
        plot_bgcolor: "#0f172a",

        xaxis: {
            title: "Date / Heure",
            type: "date",
            color: "white"
        },
        yaxis: {
            title: "Valeur",
            color: "white"
        }
    }, {
        responsive: true
    });
}

// init
loadCapteurs().then(loadGraph);

</script>

</body>
</html>
