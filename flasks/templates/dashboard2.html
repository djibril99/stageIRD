<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>

<h2>Dashboard interactif</h2>

<div id="graph" style="width:100%;height:600px;"></div>

<script>
async function loadGraph() {
    const res = await fetch("/api/data");
    const json = await res.json();

    const data = json.data;

    const traces = {};

    data.forEach(d => {
        if (!traces[d.capteur]) {
            traces[d.capteur] = {
                x: [],
                y: [],
                mode: "lines",
                name: d.capteur,
                fill: "tozeroy",          // 🔥 aire colorée
                opacity: 0.3
            };
        }

        traces[d.capteur].x.push(d.time);
        traces[d.capteur].y.push(d.raw);
    });

    Plotly.newPlot("graph", Object.values(traces), {
        title: "Capteurs (temps réel)",
        xaxis: {
            title: "Date / Heure",
            type: "date"   // 🔥 active affichage date + heure
        },
        yaxis: {
            title: "Valeur"
        }
    });
}

loadGraph();

// refresh auto (optionnel)
setInterval(loadGraph, 5000);
</script>

</body>
</html>
